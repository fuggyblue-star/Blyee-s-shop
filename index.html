<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blyee's Shop | OPay Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        :root { 
            --accent-gold: #ffc400; 
            --neon-gold: #fff0a3; 
            --sky-blue: #4db8ff;   
            --bg-dark: #0a0a0a; 
            --glass: rgba(15, 15, 15, 0.9); 
        }
        
        body { margin: 0; background-color: var(--bg-dark); font-family: 'Roboto', sans-serif; color: white; overflow-x: hidden; }

        .page-wrapper {
            background-image: url('https://i.postimg.cc/8PGQc6gS/IMG-0985.png'); 
            background-size: cover; background-position: center top; background-attachment: fixed;
            min-height: 100vh; width: 100%; position: relative;
        }

        .page-overlay { background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%); position: absolute; inset: 0; z-index: 1; }
        .content-layer { position: relative; z-index: 2; }

        header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 20px 0; border-bottom: 1px solid #222; text-align: center; }
        .logo-text { color: var(--neon-gold); font-size: 28px; font-weight: bold; text-transform: uppercase; }
        
        .auth-wrap { position: absolute; right: 15px; top: 15px; }
        .user-circle { width: 40px; height: 40px; border-radius: 50%; background: #222; border: 1.5px solid var(--accent-gold); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .user-circle img { width: 100%; height: 100%; border-radius: 50%; }

        .tabs { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        .tab-item { padding: 10px; color: #888; cursor: pointer; font-weight: bold; }
        .tab-item.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .account-card { background: var(--glass); border-radius: 20px; border: 1px solid #333; overflow: hidden; cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-body { padding: 12px; }
        .price-tag { color: var(--sky-blue); font-size: 18px; font-weight: bold; }

        .buy-btn { width: 100%; background: var(--accent-gold); color: black; border: none; padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .section-hide { display: none !important; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="page-overlay"></div>
        <div class="content-layer">
            <header>
                <div class="auth-wrap">
                    <button class="user-circle" id="login-btn" data-netlify-identity-button>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#ffc400"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                    </button>
                </div>
                <div class="logo-text">Blyee's Shop</div>
                <div class="tabs">
                    <div id="tab-accounts" class="tab-item active" onclick="switchTab('accounts')">Accounts</div>
                    <div id="tab-topup" class="tab-item" onclick="switchTab('topup')">Top-up Center</div>
                </div>
            </header>

            <main id="accounts-section" class="product-grid">
                <div class="account-card">
                    <img src="https://i.postimg.cc/8PGQc6gS/IMG-0985.png" class="card-img">
                    <div class="card-body">
                        <div style="font-size: 14px;">Level 72 Master Sakura</div>
                        <div class="price-tag">₦45,000</div>
                        <button class="buy-btn" onclick="payWithOPay('45000', 'FF Level 72 Sakura')">BUY NOW</button>
                    </div>
                </div>
            </main>

            <main id="topup-section" class="product-grid section-hide">
                <div class="account-card">
                    <div class="card-body">
                        <div style="font-size: 14px;">100 Garena Diamonds</div>
                        <div class="price-tag">₦1,200</div>
                        <button class="buy-btn" onclick="payWithOPay('1200', '100 Diamonds')">BUY NOW</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // TAB SWITCHER
        function switchTab(target) {
            const accTab = document.getElementById('tab-accounts');
            const topTab = document.getElementById('tab-topup');
            const accSec = document.getElementById('accounts-section');
            const topSec = document.getElementById('topup-section');

            if (target === 'accounts') {
                accTab.classList.add('active'); topTab.classList.remove('active');
                accSec.classList.remove('section-hide'); topSec.classList.add('section-hide');
            } else {
                topTab.classList.add('active'); accTab.classList.remove('active');
                topSec.classList.remove('section-hide'); accSec.classList.add('section-hide');
            }
        }

        // OPAY CONNECTION
        function payWithOPay(amount, itemName) {
            // Replace 'YOUR_OPAY_MERCHANT_ID' with your actual Merchant ID or Checkout URL
            const opayLink = `https://web-payment.opaycheckout.com/pay-now?merchantId=YOUR_ID&amount=${amount}&ref=${itemName}`;
            
            // Redirects user to the OPay payment screen
            window.location.href = opayLink;
        }

        // IDENTITY SYNC
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("login", user => {
                if (user.user_metadata.avatar_url) {
                    document.getElementById('login-btn').innerHTML = `<img src="${user.user_metadata.avatar_url}">`;
                }
                window.netlifyIdentity.close();
            });
        }
    </script>
</body>
</html>
