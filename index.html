<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlyeeShop | Gaming Accounts</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0c;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }
        /* The Profile Button Styling */
        .login-btn {
            background: none;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }
        .login-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .container {
            text-align: center;
            margin-top: 50px;
        }
        .status-badge {
            background: #1a1a1a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BLYEE SHOP</div>
        
        <button class="login-btn" data-netlify-identity-button>
            <i class="fas fa-user"></i>
        </button>
    </header>

    <div class="container">
        <div class="status-badge">SERVER STATUS: ONLINE</div>
        <h1>Premium Gaming Accounts</h1>
        <p>Login to view available Free Fire & COD Mobile stock.</p>
    </div>

    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/";
                    });
                }
            });
        }
    </script>
</body>
</html>
