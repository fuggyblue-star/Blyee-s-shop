<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLYEE SHOP | Premium Gaming</title>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header & Neon Logo */
        header {
            width: 100%;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 28px;
            color: #87CEEB; /* Sky Blue */
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* The Profile Icon Button */
        .profile-trigger {
            background: none;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: sans-serif;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* Server Status Bar */
        .status-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            letter-spacing: 1px;
            color: #ccc;
        }

        /* Main Content */
        .hero {
            margin-top: 60px;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        p {
            color: #aaa;
            font-family: sans-serif;
            font-size: 16px;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BLYEE SHOP</div>
        
        <button class="profile-trigger" data-netlify-identity-button>
            <i class="fas fa-user-circle" style="font-size: 24px;"></i>
            <span style="font-size: 14px; font-weight: bold;">Log in</span>
        </button>
    </header>

    <div class="status-bar">
        SERVER STATUS: <span style="color: #00ff00;">ONLINE</span>
    </div>

    <div class="hero">
        <h1>Premium Gaming Accounts</h1>
        <p>Login to view available Free Fire & COD Mobile stock.</p>
    </div>

    <script>
        // Redirect after login
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/";
                    });
                }
            });
        }
    </script>
</body>
</html>
